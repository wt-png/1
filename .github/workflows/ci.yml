name: CI — self-learning retrain

on:
  # Run every Sunday at 02:00 UTC to retrain on fresh trade data
  schedule:
    - cron: "0 2 * * 0"
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      force:
        description: "Write thresholds even when quality gate fails"
        required: false
        default: "false"
      min_trades:
        description: "Minimum trades required to retrain"
        required: false
        default: "30"
  # Also run tests on every push / PR
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── 1. Pytest for Python tools ─────────────────────────────────────────
  test:
    name: Python tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest scikit-learn xgboost pandas

      - name: Run tests
        run: pytest tools/test_online_retrain.py -v --tb=short

  # ── 2. Weekly retrain (schedule / manual only) ─────────────────────────
  retrain:
    name: Retrain ML entry gate
    runs-on: ubuntu-latest
    # Only run on schedule or manual dispatch, not on every push/PR
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can commit back
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install scikit-learn xgboost pandas

      - name: Run retrain
        id: retrain
        run: |
          FORCE_FLAG=""
          MIN_TRADES="${{ github.event.inputs.min_trades || '30' }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python tools/online_retrain.py \
            --csv ml_export_v2.csv \
            --out ml_thresholds.json \
            --min-trades "$MIN_TRADES" \
            $FORCE_FLAG
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Commit updated thresholds
        if: steps.retrain.outcome == 'success' && hashFiles('ml_thresholds.json') != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml_thresholds.json
          if git diff --cached --quiet; then
            echo "No changes to ml_thresholds.json — nothing to commit."
          else
            git commit -m "chore(ml): update ml_thresholds.json [skip ci]"
            git push
          fi
